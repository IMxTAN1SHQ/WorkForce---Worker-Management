<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | Tejal Enterprises</title>
  <!-- Tailwind CSS -->
  <script src="../assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="../assets/css/styles.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">

  <main class="max-w-md mx-auto px-4 py-6 space-y-6">

    <!-- Header navigation back link -->
    <div class="flex items-center gap-2">
      <a href="dashboard.html" class="p-2 hover:bg-slate-200 rounded-lg text-slate-600 transition">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
      </a>
      <h2 class="font-bold text-lg text-slate-800">My Profile</h2>
    </div>

    <!-- Profile Detail Card -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 space-y-5">
      <div class="flex flex-col items-center text-center space-y-2 border-b border-slate-100 pb-4">
        <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center text-white text-3xl font-extrabold shadow-md shadow-blue-100">
          <span id="profile-initials">--</span>
        </div>
        <div>
          <h3 id="profile-name" class="font-bold text-lg text-slate-800">Loading Profile...</h3>
          <span class="inline-block bg-slate-100 text-slate-600 text-[10px] font-bold px-2.5 py-0.5 rounded-full border border-slate-200">FIELD ELECTRICIAN</span>
        </div>
      </div>

      <!-- Information list -->
      <div class="space-y-3.5 text-sm">
        
        <div class="flex justify-between items-center py-0.5">
          <span class="text-xs text-slate-400 font-semibold uppercase">Assigned Site</span>
          <span id="profile-site" class="font-bold text-slate-800">Checking...</span>
        </div>

        <div class="flex justify-between items-center py-0.5">
          <span class="text-xs text-slate-400 font-semibold uppercase">Email</span>
          <span id="profile-email" class="text-slate-700 font-medium">--</span>
        </div>

        <div class="flex justify-between items-center py-0.5">
          <span class="text-xs text-slate-400 font-semibold uppercase">Joining Date</span>
          <span id="profile-joining" class="text-slate-700 font-medium">--</span>
        </div>

      </div>
    </div>

    <!-- Edit Profile Card Form -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 space-y-4">
      <div class="flex items-center gap-2 border-b border-slate-50 pb-3">
        <i data-lucide="edit-3" class="w-4 h-4 text-blue-600"></i>
        <h3 class="font-bold text-sm text-slate-800">Edit Personal Details</h3>
      </div>

      <form id="profile-edit-form" class="space-y-4">
        <div>
          <label for="edit-name" class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Full Name</label>
          <input type="text" id="edit-name" required class="w-full px-3.5 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-600 text-sm transition focus:ring-2 focus:ring-blue-50" />
        </div>

        <div>
          <label for="edit-phone" class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Phone Number</label>
          <input type="tel" id="edit-phone" class="w-full px-3.5 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-600 text-sm transition focus:ring-2 focus:ring-blue-50" />
        </div>

        <div>
          <label for="edit-address" class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Home Address</label>
          <textarea id="edit-address" rows="2" class="w-full px-3.5 py-2 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-600 text-sm transition focus:ring-2 focus:ring-blue-50"></textarea>
        </div>

        <button type="submit" id="btn-save-profile" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg shadow-md hover:shadow-lg transition flex items-center justify-center gap-2 cursor-pointer">
          <i data-lucide="save" class="w-4.5 h-4.5"></i>
          <span>Save Changes</span>
        </button>
      </form>
    </div>

  </main>

  <!-- Supabase Client & Common Inits -->
  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/common.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const profile = JSON.parse(sessionStorage.getItem('user_profile'));
      if (!profile) return;

      // Populate displays
      document.getElementById('profile-name').innerText = profile.full_name;
      document.getElementById('profile-email').innerText = profile.email || '--';
      
      const initials = profile.full_name
        .split(' ')
        .map(n => n[0])
        .slice(0, 2)
        .join('')
        .toUpperCase();
      document.getElementById('profile-initials').innerText = initials || 'E';

      if (profile.joining_date) {
        const dateObj = new Date(profile.joining_date + 'T00:00:00');
        document.getElementById('profile-joining').innerText = dateObj.toLocaleDateString('en-US', {
          month: 'long',
          day: 'numeric',
          year: 'numeric'
        });
      } else {
        document.getElementById('profile-joining').innerText = '--';
      }

      // Populate edit fields
      document.getElementById('edit-name').value = profile.full_name;
      document.getElementById('edit-phone').value = profile.phone || '';
      document.getElementById('edit-address').value = profile.address || '';

      // Populate Assigned Site Name
      const cachedSite = sessionStorage.getItem('assigned_site');
      if (cachedSite) {
        const site = JSON.parse(cachedSite);
        document.getElementById('profile-site').innerText = site.site_name;
        document.getElementById('profile-site').className = "font-bold text-slate-800";
      } else {
        document.getElementById('profile-site').innerText = "No Assigned Site";
        document.getElementById('profile-site').className = "font-bold text-rose-500";
      }
    });

    document.getElementById('profile-edit-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn = document.getElementById('btn-save-profile');
      const profile = JSON.parse(sessionStorage.getItem('user_profile'));
      
      if (!profile || !window.supabaseInstance) return;

      const newName = document.getElementById('edit-name').value.trim();
      const newPhone = document.getElementById('edit-phone').value.trim();
      const newAddress = document.getElementById('edit-address').value.trim();

      btn.disabled = true;
      btn.innerHTML = `<i data-lucide="loader-2" class="w-4.5 h-4.5 animate-spin"></i> Saving...`;
      if (typeof lucide !== 'undefined') lucide.createIcons();

      try {
        // Update database table profiles
        const { error } = await window.supabaseInstance
          .from('profiles')
          .update({
            full_name: newName,
            phone: newPhone || null,
            address: newAddress || null
          })
          .eq('auth_user_id', profile.auth_user_id);

        if (error) throw error;

        // Update session storage
        profile.full_name = newName;
        profile.phone = newPhone || null;
        profile.address = newAddress || null;
        sessionStorage.setItem('user_profile', JSON.stringify(profile));

        showToast("Profile updated successfully!");
        
        // Refresh display
        document.getElementById('profile-name').innerText = newName;
        const initials = newName
          .split(' ')
          .map(n => n[0])
          .slice(0, 2)
          .join('')
          .toUpperCase();
        document.getElementById('profile-initials').innerText = initials || 'E';

      } catch (err) {
        showToast(err.message || "Failed to update profile.", "error");
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i data-lucide="save" class="w-4.5 h-4.5"></i> Save Changes`;
        if (typeof lucide !== 'undefined') lucide.createIcons();
      }
    });
  </script>
</body>
</html>
